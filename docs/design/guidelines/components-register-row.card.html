<!-- @dsCard group="Components" viewport="700x200" subtitle="Register density — date, payee, category, memo, outflow/inflow, cleared" name="Register table sample" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 12px; background: var(--bg-app); }
  .wrap { border: 1px solid var(--border-default); border-radius: 6px; overflow: hidden; background: #fff; }
  td, th { white-space: nowrap; }
  td.memo { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
</style>
</head>
<body>
  <div class="wrap">
    <table class="mnab-table">
      <thead>
        <tr><th>Date</th><th>Payee</th><th>Category</th><th>Memo</th><th class="num">Outflow</th><th class="num">Inflow</th><th style="text-align:center;">✓</th></tr>
      </thead>
      <tbody>
        <tr class="is-selected"><td class="num" style="text-align:left;">06/10/2026</td><td>Trader Joe's</td><td>Groceries</td><td class="memo">weekly run</td><td class="num">$84.12</td><td class="num"></td><td style="text-align:center;"><span class="cleared-check">✓</span></td></tr>
        <tr><td class="num" style="text-align:left;">06/09/2026</td><td>Acme Payroll</td><td>Ready to Assign</td><td class="memo"></td><td class="num"></td><td class="num amount-inflow">$3,500.00</td><td style="text-align:center;"><span class="cleared-check">✓</span></td></tr>
        <tr><td class="num" style="text-align:left;">06/08/2026</td><td>Shell</td><td>Transport</td><td class="memo"></td><td class="num">$42.07</td><td class="num"></td><td style="text-align:center;"><span class="uncleared-check">✓</span></td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
